repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format --check
        language: system
        types:
          - python

      - id: ruff-check
        name: ruff check
        entry: uv run ruff check
        language: system
        types:
          - python

      - id: pyright
        name: pyright
        entry: uv run pyright
        language: system
        types:
          - python
        pass_filenames: false
